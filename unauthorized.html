<!DOCTYPE html>
<html>
<head>
    <title>Unauthorized Hardware</title>
</head>
<body style="background: #450a0a; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; margin: 0; overflow: hidden;">
    <div>
        <div style="font-size: 80px; margin-bottom: 20px;">⚠️</div>
        <h1 style="font-size: 32px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">UNAUTHORIZED HARDWARE</h1>
        <p style="font-size: 18px; opacity: 0.8; max-width: 400px; line-height: 1.5; margin: 0 auto;">
            This software license is locked to a specific computer and cannot be shared.
        </p>
        <p style="margin-top: 30px; font-size: 14px; opacity: 0.5;">
            Please contact your administrator for assistance.
        </p>
        <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 13px; color: #fecaca; text-align: left; border: 1px solid rgba(255,255,255,0.1);">
            <div style="margin-bottom: 5px;"><strong>HWID:</strong> <span id="hwid-display">Loading...</span></div>
            <div style="margin-bottom: 5px;"><strong>ENV PATH:</strong> <span id="env-path">Loading...</span></div>
            <div style="margin-bottom: 5px;"><strong>ENV FILE:</strong> <span id="env-status" style="font-weight: bold;">...</span></div>
            <div><strong>AUTH_SECRET:</strong> <span id="auth-status" style="font-weight: bold;">...</span></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Display HWID
        const hwid = urlParams.get('hwid');
        document.getElementById('hwid-display').textContent = hwid || "Not Detected";

        // Display Env Path
        const envPath = urlParams.get('envPath');
        document.getElementById('env-path').textContent = envPath || "Not Detected";

        // Display Env Status
        const envStatus = urlParams.get('envStatus');
        const envEl = document.getElementById('env-status');
        envEl.textContent = envStatus || "UNKNOWN";
        envEl.style.color = envStatus === "FOUND" ? "#4ade80" : "#ef4444";

        // Display Auth Status
        const authStatus = urlParams.get('authStatus');
        const authEl = document.getElementById('auth-status');
        authEl.textContent = authStatus || "UNKNOWN";
        authEl.style.color = authStatus === "LOADED" ? "#4ade80" : "#ef4444";
    </script>
</body>
</html>
